<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final Message ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
font-family:'Montserrat',sans-serif;
color:white;
}

.movie{

position:relative;
width:100%;
height:100vh;
overflow:hidden;

}

.slide{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0;
transition:1.5s ease-in-out;

}

.slide.active{

opacity:1;

}

.slide{
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
max-width:90vw;
max-height:75vh;
width:auto;
height:auto;
object-fit:contain;
display:block;
margin:auto;
}

.overlay{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:
linear-gradient(
to top,
rgba(0,0,0,.75),
rgba(0,0,0,.2),
rgba(0,0,0,.75)
);

}

.caption{

position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);

font-family:'Cormorant Garamond',serif;

font-size:3rem;

width:90%;

text-align:center;

color:white;

text-shadow:0 0 20px rgba(0,0,0,.8);

}

.movie-title{
position:absolute;
top:5px;
left:50%;
transform:translateX(-50%);
font-family:'Cormorant Garamond',serif;
font-size:3.5rem;
white-space:nowrap;
color:#ffd166;
letter-spacing:2px;
z-index:99;
}

.final-scene{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:black;

opacity:0;
visibility:hidden;

transition:2s;

z-index:99999;
overflow:hidden;

}

.final-scene.show{

opacity:1;
visibility:visible;

}

.final-photo{
margin-bottom:40px;
}

.final-photo img{
    width:350px;
    max-width:80vw;
    height:auto;
    border-radius:25px;
    box-shadow:0 0 60px rgba(255,209,102,.3);
}

@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.08);
}

}

.final-title{
    font-size:4rem;
    font-family:'Cormorant Garamond',serif;
    color:#ffd166;
    margin-top:20px;
    margin-bottom:30px;
    text-align:center;
    line-height:1.1;
}

.final-text{
    font-size:1.6rem;
    line-height:1.8;
    max-width:700px;
    text-align:center;
    padding:0 20px;
}

.signature{

margin-top:40px;

font-size:2rem;

font-family:'Cormorant Garamond',serif;

color:#ffd166;

}

.credits{

position:absolute;

bottom:-100%;

width:100%;

text-align:center;

font-size:1.4rem;

line-height:2.5;

opacity:0;

z-index:101;

}

.credits.show{

opacity:1;

animation:creditsMove 25s linear forwards;

}

@keyframes creditsMove{

0%{
bottom:-100%;
}

100%{
bottom:120%;
}

}

@media(max-width:768px){

.movie-title{
font-size:2rem;
top:25px;
}

.caption{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:85%;

font-family:'Cormorant Garamond',serif;
font-size:2.3rem;
font-weight:700;

text-align:center;
color:white;

background:rgba(0,0,0,.55);

padding:18px 35px;

border-radius:12px;

backdrop-filter:blur(6px);

text-shadow:0 0 15px rgba(0,0,0,.9);
}

.final-title{
font-size:2.5rem;
}

.final-text{
font-size:1.1rem;
}

.signature{
font-size:1.5rem;
}

}

.credits{
position:fixed;
bottom:-100%;
left:50%;
transform:translateX(-50%);
text-align:center;
font-size:2rem;
line-height:2.5;
width:100%;
opacity:0;
}

.credits.show{
opacity:1;
animation:creditsRoll 25s linear forwards;
}

@keyframes creditsRoll{

0%{
bottom:-100%;
}

100%{
bottom:120%;
}

}
.memory-frame{
    position:relative;
    width:900px;
    max-width:90vw;
    height:500px;
}

.corner{
    position:absolute;
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:20px;
    border:4px solid #ffd166;
    box-shadow:0 0 25px rgba(255,209,102,.4);
}

.tl{
    top:0;
    left:0;
}

.tr{
    top:0;
    right:0;
}

.bl{
    bottom:0;
    left:0;
}

.br{
    bottom:0;
    right:0;
}

.memory-frame .signature{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    margin-top:0;
    text-align:center;
    font-size:3rem;
    color:#ffd166;
    font-family:'Cormorant Garamond',serif;
}

@media screen and (max-width:768px){

body{
overflow-x:hidden;
}

/* HEADINGS */

h1{
font-size:2.4rem !important;
line-height:1.3;
}

h2{
font-size:2rem !important;
line-height:1.3;
}

/* INDEX PAGE */

.title{
font-size:3rem !important;
}

.subtitle{
font-size:2rem !important;
}

.line{
font-size:1rem !important;
}

.line2{
font-size:1rem !important;
}

.quote{
font-size:0.9rem !important;
padding:0 15px;
}

/* BUTTONS */

.btn{
padding:15px 28px !important;
font-size:1rem !important;
}

/* CHILDHOOD PAGE */

.story{
font-size:1rem !important;
line-height:1.8 !important;
padding:0 10px;
}

.memory{
width:100%;
padding:25px;
font-size:1rem;
line-height:1.8;
}

.gallery img{
width:100% !important;
height:auto !important;
}

/* GALLERY PAGE */

.album{
columns:1 !important;
}

.photo-card{
width:100%;
margin-bottom:20px;
}

.photo-caption{
font-size:0.95rem;
line-height:1.5;
}

/* LETTER PAGE */

.paper{
padding:25px !important;
}

.letter{
font-size:1rem !important;
line-height:1.9 !important;
}

.signature{
font-size:1.6rem !important;
}

/* SURPRISE PAGE */

.movie-title{
font-size:2rem !important;
top:20px !important;
}

.caption{
font-size:1.8rem !important;
bottom:25px !important;
width:90% !important;
padding:15px !important;
}

.slide img{
max-width:95vw !important;
max-height:60vh !important;
}

.memory-frame{
width:100% !important;
height:350px !important;
}

.corner{
width:100px !important;
height:100px !important;
}

.memory-frame .signature{
font-size:1.7rem !important;
width:80%;
}

.credits{
font-size:1.2rem !important;
line-height:2 !important;
}

}


</style>
</head>

<body>

<audio id="music" autoplay muted loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="movie">

<div class="movie-title">

Happy Father's Day Pappa❤️

</div>

<div id="slides-container">

<!-- Slides generated by JS -->

</div>

<div id="finalScene" class="final-scene">

    <div class="memory-frame">

        <img src="photos/photo (20).jpg" class="corner tl">
        <img src="photos/photo (8).jpg" class="corner tr">
        <img src="photos/photo (21).jpg" class="corner bl">
        <img src="photos/photo (18).jpg" class="corner br">

        <div class="signature">
            Love Forever,
            <br>
            Your Guddu ❤️
        </div>

    </div>

</div>

<div id="credits" class="credits">

Happy Father's Day Pappa ❤️

<br><br>

A Daughter's First Hero

<br>

A Daughter's Safe Place

<br>

A Daughter's Greatest Blessing

<br><br>

Thank You For Everything

<br><br>

Forever Your Little Girl

<br><br>

Guddu ❤️

</div>

</div>

<script>

const photos = [

{
img:"photos/photo (1).jpg",
text:"Every memory has a beginning..."
},

{
img:"photos/photo (2).jpg",
text:"And every beginning had you."
},

{
img:"photos/photo (3).jpg",
text:"You were always beside me."
},

{
img:"photos/photo (4).jpg",
text:"The first man I ever trusted ❤️"
},

{
img:"photos/photo (5).jpg",
text:"Home was wherever you were ❤️"
},

{
img:"photos/photo (6).jpg",
text:"The hand that never let go ❤️"
},

{
img:"photos/photo (7).jpg",
text:"Every smile tells a story."
},

{
img:"photos/photo (8).jpg",
text:"Every story has you in it."
},

{
img:"photos/photo (9).jpg",
text:"The best journeys were with you."
},

{
img:"photos/photo (10).jpg",
text:"The happiest days too."
},

{
img:"photos/photo (11).jpg",
text:"Thank you for every sacrifice."
},

{
img:"photos/photo (12).jpg",
text:"For every silent prayer."
},

{
img:"photos/photo (13).jpg",
text:"For every lesson."
},

{
img:"photos/photo (14).jpg",
text:"For every moment of love."
},

{
img:"photos/photo (15).jpg",
text:"You taught me how to stand tall ❤️"
},

{
img:"photos/photo (16).jpg",
text:"You taught me how to love ❤️"
},

{
img:"photos/photo (17).jpg",
text:"You taught me strength."
},

{
img:"photos/photo (18).jpg",
text:"You taught me how to keep going."
},

{
img:"photos/photo (19).jpg",
text:"The years changed... ❤️"
},

{
img:"photos/photo (20).jpg",
text:"But your love never did ❤️"
},

{
img:"photos/photo (21).jpg",
text:"I will always be your little girl ❤️"
},

{
img:"photos/photo (22).jpg",
text:"Forever and always ❤️"
}

];

const container =
document.getElementById(
"slides-container"
);

photos.forEach((item,index)=>{

const slide =
document.createElement("div");

slide.className="slide";

slide.innerHTML=`

<img src="${item.img}">

<div class="overlay"></div>

<div class="caption">

${item.text}

</div>

`;

container.appendChild(slide);

});

const slides =
document.querySelectorAll(".slide");

let current = 0;

slides[0].classList.add("active");

function nextSlide(){

slides[current]
.classList.remove("active");

current++;

if(current < slides.length){

slides[current]
.classList.add("active");

}
else{

showFinal();

}

}

const slideshow = setInterval(()=>{

slides[current].classList.remove("active");

current++;

if(current < slides.length){

slides[current].classList.add("active");

}
else{

clearInterval(slideshow);

showFinal();

}

},3500);

function showFinal(){

    document.getElementById("slides-container").style.display = "none";
    document.querySelector(".movie-title").style.display = "none";

    document.getElementById("finalScene").classList.add("show");

    // Stop music after 10 seconds on final page
    setTimeout(() => {

        const music = document.getElementById("music");

        music.pause();
        music.currentTime = 0;

    }, 10000);

    setTimeout(() => {
        document.getElementById("credits").classList.add("show");
    }, 18000);

}

window.onload = () => {

    const music = document.getElementById("music");

    music.muted = false;

    music.play().catch(err => console.log(err));

};
document.addEventListener("click", function () {
    const music = document.getElementById("music");

    if (music.paused) {
        music.play();
    }
}, { once: true });

</script>
